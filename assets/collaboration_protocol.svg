<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3b0"/>
      <stop offset="45%" stop-color="#ffd700"/>
      <stop offset="80%" stop-color="#ff9d00"/>
      <stop offset="100%" stop-color="#ff6a00"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb000" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffb000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- panel -->
  <rect x="1" y="1" width="898" height="318" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- corner brackets -->
  <path d="M 14 44 L 14 14 L 44 14" fill="none" stroke="#ff4b3e" stroke-width="4" stroke-linecap="square"/>
  <path d="M 856 14 L 886 14 L 886 44" fill="none" stroke="#ffd700" stroke-width="4" stroke-linecap="square"/>
  <path d="M 14 276 L 14 306 L 44 306" fill="none" stroke="#ff4b3e" stroke-width="2" stroke-linecap="square" opacity="0.5"/>
  <path d="M 856 306 L 886 306 L 886 276" fill="none" stroke="#ffd700" stroke-width="2" stroke-linecap="square" opacity="0.5"/>

  <!-- header -->
  <text x="42" y="66" font-size="22" font-weight="bold" fill="#ff4b3e" letter-spacing="1">&gt; INITIATE COLLABORATION_PROTOCOL</text>
  <text x="42" y="98" font-size="14" fill="#8b949e">Scanning for compatible vectors and shared systems...</text>

  <!-- skills -->
  <text x="42" y="152" font-size="15">
    <tspan fill="#ff4b3e">[+]</tspan><tspan fill="#ffd700" dx="8">Java &amp; Backend Development</tspan>
  </text>
  <text x="42" y="188" font-size="15">
    <tspan fill="#ff4b3e">[+]</tspan><tspan fill="#ff9d00" dx="8">Flutter Cross-Platform Apps</tspan>
  </text>
  <text x="350" y="152" font-size="15">
    <tspan fill="#ff4b3e">[+]</tspan><tspan fill="#ff9d00" dx="8">Data Structures &amp; Algorithms</tspan>
  </text>
  <text x="350" y="188" font-size="15">
    <tspan fill="#ff4b3e">[+]</tspan><tspan fill="#ffd700" dx="8">Android App Development</tspan>
  </text>

  <!-- status -->
  <text x="42" y="258" font-size="16" font-weight="bold">
    <tspan fill="#ff4b3e">&gt; STATUS:</tspan><tspan fill="#ffd700" dx="10">AWAITING_CONNECTION</tspan><tspan fill="#ffd700">_<animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/></tspan>
  </text>
  <rect x="42" y="272" width="238" height="3" fill="#ffd700" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0.35;0.85" dur="2.4s" repeatCount="indefinite"/>
  </rect>

  <!-- solar system -->
  <g transform="translate(760,160)">
    <circle r="70" fill="url(#sunGlow)">
      <animate attributeName="opacity" values="1;0.55;1" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="58" fill="none" stroke="#ffd700" stroke-width="1.4" stroke-dasharray="5 7" opacity="0.65"/>
    <circle r="94" fill="none" stroke="#ff4b3e" stroke-width="1.4" stroke-dasharray="5 7" opacity="0.65"/>
    <circle r="34" fill="url(#sunGrad)"/>
    <g>
      <circle cx="58" cy="0" r="6" fill="#ffd700"/>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="9s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="-94" cy="0" r="5" fill="#ff4b3e"/>
      <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="16s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
